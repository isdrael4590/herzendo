services:
  herzendo:
    build:
      context: .
      dockerfile: Dockerfile
    image: herzendo-app
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - django_static:/app/staticfiles
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  django_static:
    driver: local
