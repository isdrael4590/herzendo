<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestión de Pacientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .table th { background-color: #0d6efd; color: #fff; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .role-pill {
      font-size: .7rem;
      font-weight: 700;
      padding: .15rem .55rem;
      border-radius: 1rem;
      letter-spacing: .3px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'lista' %}">
        <i class="bi bi-hospital me-2"></i>Gestión de Pacientes
      </a>

      <div class="d-flex align-items-center gap-2">
        <a href="{% url 'referencias:lista' %}" class="btn btn-outline-light btn-sm">
          <i class="bi bi-table me-1"></i>Referencias
        </a>

        {% if puede_pdf %}
        <a href="{% url 'subir_pdf' %}" class="btn btn-outline-light btn-sm">
          <i class="bi bi-file-earmark-pdf-fill me-1"></i>Cargar PDF
        </a>
        {% endif %}

        {% if user.is_authenticated %}
          {% if puede_eliminar %}
          <a href="{% url 'usuarios_lista' %}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-people-fill me-1"></i>Personal
          </a>
          {% endif %}

          <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle me-1"></i>{{ user.get_full_name|default:user.username }}
              <span class="role-pill ms-1
                {% if puede_eliminar %}bg-danger text-white
                {% elif puede_editar %}bg-warning text-dark
                {% else %}bg-light text-dark{% endif %}">
                {{ rol_nombre }}
              </span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><h6 class="dropdown-header">{{ user.username }}</h6></li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <form method="post" action="{% url 'logout' %}">
                  {% csrf_token %}
                  <button type="submit" class="dropdown-item text-danger">
                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                  </button>
                </form>
              </li>
            </ul>
          </div>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
