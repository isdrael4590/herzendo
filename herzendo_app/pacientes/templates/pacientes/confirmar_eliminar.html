{% extends 'pacientes/base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <h2 class="h5 mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar Eliminación</h2>
      </div>
      <div class="card-body text-center py-4">
        <p class="lead">¿Está seguro que desea eliminar al paciente?</p>
        <p class="fs-5 fw-bold text-danger">{{ paciente }}</p>
        <p class="text-muted">DNI: {{ paciente.dni }}</p>
        <p class="text-muted small">Esta acción no se puede deshacer.</p>
        <form method="post" class="d-flex justify-content-center gap-3 mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash3-fill me-1"></i>Sí, eliminar
          </button>
          <a href="{% url 'lista' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Cancelar
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
