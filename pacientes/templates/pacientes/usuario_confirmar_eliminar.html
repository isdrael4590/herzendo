{% extends 'pacientes/base.html' %}
{% block content %}
<div class="card" style="max-width:480px;margin:auto">
  <div class="card-body text-center py-4">
    <i class="bi bi-exclamation-triangle-fill text-danger display-4 mb-3 d-block"></i>
    <h5>¿Eliminar usuario?</h5>
    <p class="text-muted">
      Se eliminará permanentemente el usuario <strong>{{ usuario.username }}</strong>
      {% if usuario.get_full_name %}({{ usuario.get_full_name }}){% endif %}.
      Esta acción no se puede deshacer.
    </p>
    <form method="post" class="d-flex justify-content-center gap-2 mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">
        <i class="bi bi-trash3-fill me-1"></i>Sí, eliminar
      </button>
      <a href="{% url 'usuarios_lista' %}" class="btn btn-outline-secondary">
        <i class="bi bi-x-lg me-1"></i>Cancelar
      </a>
    </form>
  </div>
</div>
{% endblock %}
